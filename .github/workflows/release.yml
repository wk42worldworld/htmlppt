name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            target: --linux
            arch: --x64
          - name: Windows x64
            os: windows-latest
            target: --win
            arch: --x64
          - name: macOS x64
            os: macos-14
            target: --mac
            arch: --x64
          - name: macOS arm64
            os: macos-14
            target: --mac
            arch: --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: package_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          EXPECTED_TAG="v${{ steps.package_version.outputs.value }}"
          if [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $EXPECTED_TAG"
            exit 1
          fi

      - name: Verify source
        run: npm test

      - name: Validate macOS notarization config
        if: runner.os == 'macOS' && vars.ENABLE_APPLE_NOTARIZATION == 'true'
        shell: bash
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          certificate="${MAC_CERTIFICATE_BASE64:-${APPLE_CERTIFICATE:-}}"
          certificate_password="${MAC_CERTIFICATE_PASSWORD:-${APPLE_CERTIFICATE_PASSWORD:-}}"
          apple_password="${APPLE_APP_SPECIFIC_PASSWORD:-${APPLE_PASSWORD:-}}"
          missing=0

          require_value() {
            local value="$1"
            local label="$2"
            if [ -z "$value" ]; then
              echo "::error::$label is required when ENABLE_APPLE_NOTARIZATION=true."
              missing=1
            fi
          }

          require_value "$certificate" "MAC_CERTIFICATE_BASE64 or APPLE_CERTIFICATE"
          require_value "$certificate_password" "MAC_CERTIFICATE_PASSWORD or APPLE_CERTIFICATE_PASSWORD"

          api_key_touched=false
          api_key_ready=false
          if [ -n "${APPLE_API_KEY_BASE64:-}" ] || [ -n "${APPLE_API_KEY_ID:-}" ] || [ -n "${APPLE_API_ISSUER:-}" ]; then
            api_key_touched=true
            require_value "${APPLE_API_KEY_BASE64:-}" "APPLE_API_KEY_BASE64"
            require_value "${APPLE_API_KEY_ID:-}" "APPLE_API_KEY_ID"
            require_value "${APPLE_API_ISSUER:-}" "APPLE_API_ISSUER"
            if [ -n "${APPLE_API_KEY_BASE64:-}" ] && [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
              api_key_ready=true
            fi
          fi

          apple_id_touched=false
          apple_id_ready=false
          if [ -n "${APPLE_ID:-}" ] || [ -n "$apple_password" ] || [ -n "${APPLE_TEAM_ID:-}" ]; then
            apple_id_touched=true
            require_value "${APPLE_ID:-}" "APPLE_ID"
            require_value "$apple_password" "APPLE_APP_SPECIFIC_PASSWORD or APPLE_PASSWORD"
            require_value "${APPLE_TEAM_ID:-}" "APPLE_TEAM_ID"
            if [ -n "${APPLE_ID:-}" ] && [ -n "$apple_password" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
              apple_id_ready=true
            fi
          fi

          if [ "$api_key_ready" != "true" ] && [ "$apple_id_ready" != "true" ]; then
            if [ "$api_key_touched" != "true" ] && [ "$apple_id_touched" != "true" ]; then
              echo "::error::Provide either APPLE_API_KEY_BASE64 + APPLE_API_KEY_ID + APPLE_API_ISSUER, or APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD/APPLE_PASSWORD + APPLE_TEAM_ID."
            fi
            missing=1
          fi

          exit "$missing"

      - name: Configure unsigned signing fallback
        if: runner.os != 'macOS' || vars.ENABLE_APPLE_NOTARIZATION != 'true'
        shell: bash
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - name: Configure macOS signing and notarization
        if: runner.os == 'macOS' && vars.ENABLE_APPLE_NOTARIZATION == 'true'
        shell: bash
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_SIGNING_IDENTITY: ${{ secrets.MAC_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          signing_enabled=false
          notarization_enabled=false
          certificate="${MAC_CERTIFICATE_BASE64:-${APPLE_CERTIFICATE:-}}"
          certificate_password="${MAC_CERTIFICATE_PASSWORD:-${APPLE_CERTIFICATE_PASSWORD:-}}"
          signing_identity="${MAC_SIGNING_IDENTITY:-${APPLE_SIGNING_IDENTITY:-}}"
          apple_password="${APPLE_APP_SPECIFIC_PASSWORD:-${APPLE_PASSWORD:-}}"

          if [ -n "$certificate" ] && [ -n "$certificate_password" ]; then
            cert_path="$RUNNER_TEMP/mac-signing-cert.p12"
            CERTIFICATE_BASE64="$certificate" node -e "require('fs').writeFileSync(process.argv[1], Buffer.from(process.env.CERTIFICATE_BASE64, 'base64'))" "$cert_path"
            echo "CSC_LINK=$cert_path" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$certificate_password" >> "$GITHUB_ENV"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=true" >> "$GITHUB_ENV"
            if [ -n "$signing_identity" ] && [ "$signing_identity" != "-" ]; then
              signing_identity="${signing_identity#Developer ID Application: }"
              echo "CSC_NAME=$signing_identity" >> "$GITHUB_ENV"
            fi
            signing_enabled=true
          else
            echo "::error::macOS signing certificate secrets are missing while ENABLE_APPLE_NOTARIZATION=true."
            exit 1
          fi

          if [ "$signing_enabled" = "true" ] && [ -n "$APPLE_API_KEY_BASE64" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER" ]; then
            api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            node -e "require('fs').writeFileSync(process.argv[1], Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'))" "$api_key_path"
            chmod 600 "$api_key_path"
            echo "APPLE_API_KEY=$api_key_path" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
            notarization_enabled=true
          elif [ "$signing_enabled" = "true" ] && [ -n "$APPLE_ID" ] && [ -n "$apple_password" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=$apple_password" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
            notarization_enabled=true
          else
            echo "::error::macOS notarization credentials are missing while ENABLE_APPLE_NOTARIZATION=true."
            exit 1
          fi

          echo "MAC_SIGNING_ENABLED=$signing_enabled" >> "$GITHUB_ENV"
          echo "MAC_NOTARIZATION_ENABLED=$notarization_enabled" >> "$GITHUB_ENV"

      - name: Build desktop app
        run: npm run dist -- ${{ matrix.target }} ${{ matrix.arch }} --publish never

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: htmlppt-${{ matrix.name }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: PPT.html Studio ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/*.dmg
            dist/*.zip
