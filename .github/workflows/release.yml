name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            target: --linux
            arch: --x64
          - name: Windows x64
            os: windows-latest
            target: --win
            arch: --x64
          - name: macOS x64
            os: macos-13
            target: --mac
            arch: --x64
          - name: macOS arm64
            os: macos-14
            target: --mac
            arch: --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        run: npm test

      - name: Build desktop app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist -- ${{ matrix.target }} ${{ matrix.arch }} --publish never

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: htmlppt-${{ matrix.name }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: PPT.html Studio ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/*.dmg
            dist/*.zip

