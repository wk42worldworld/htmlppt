<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PPT.html Studio</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-new" viewBox="0 0 24 24">
      <path d="M6 3.5h8l4 4V20.5H6z"></path>
      <path d="M14 3.5V8h4"></path>
      <path d="M12 11v6"></path>
      <path d="M9 14h6"></path>
    </symbol>
    <symbol id="icon-template" viewBox="0 0 24 24">
      <path d="M4 5h7v6H4z"></path>
      <path d="M13 5h7v6h-7z"></path>
      <path d="M4 13h7v6H4z"></path>
      <path d="M13 13h7v6h-7z"></path>
    </symbol>
    <symbol id="icon-open" viewBox="0 0 24 24">
      <path d="M4 7.5h6l2 2h8v9H4z"></path>
      <path d="M4 9.5V6h6l2 2"></path>
    </symbol>
    <symbol id="icon-save" viewBox="0 0 24 24">
      <path d="M5 4h12l2 2v14H5z"></path>
      <path d="M8 4v6h8V4"></path>
      <path d="M8 16h8"></path>
    </symbol>
    <symbol id="icon-save-as" viewBox="0 0 24 24">
      <path d="M5 4h11l3 3v13H5z"></path>
      <path d="M8 4v6h7V4"></path>
      <path d="M8 17h5"></path>
      <path d="M16 16l3 3"></path>
      <path d="M19 16l-3 3"></path>
    </symbol>
    <symbol id="icon-json" viewBox="0 0 24 24">
      <path d="M9 7 5 12l4 5"></path>
      <path d="m15 7 4 5-4 5"></path>
      <path d="m13 5-2 14"></path>
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24">
      <path d="m5 12 4 4L19 6"></path>
    </symbol>
    <symbol id="icon-play" viewBox="0 0 24 24">
      <path d="M8 5v14l11-7z"></path>
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <path d="M12 5v14"></path>
      <path d="M5 12h14"></path>
    </symbol>
    <symbol id="icon-copy" viewBox="0 0 24 24">
      <path d="M8 8h10v12H8z"></path>
      <path d="M6 16H4V4h10v2"></path>
    </symbol>
    <symbol id="icon-up" viewBox="0 0 24 24">
      <path d="m6 14 6-6 6 6"></path>
    </symbol>
    <symbol id="icon-down" viewBox="0 0 24 24">
      <path d="m6 10 6 6 6-6"></path>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24">
      <path d="M5 7h14"></path>
      <path d="M9 7V5h6v2"></path>
      <path d="M7 7l1 13h8l1-13"></path>
    </symbol>
    <symbol id="icon-undo" viewBox="0 0 24 24">
      <path d="M9 8H5v4"></path>
      <path d="M5 12c2-4 6-6 10-5 3 .7 5 3 5 6 0 4-3 7-7 7"></path>
    </symbol>
    <symbol id="icon-redo" viewBox="0 0 24 24">
      <path d="M15 8h4v4"></path>
      <path d="M19 12c-2-4-6-6-10-5-3 .7-5 3-5 6 0 4 3 7 7 7"></path>
    </symbol>
    <symbol id="icon-text" viewBox="0 0 24 24">
      <path d="M5 6h14"></path>
      <path d="M12 6v12"></path>
      <path d="M9 18h6"></path>
    </symbol>
    <symbol id="icon-image" viewBox="0 0 24 24">
      <path d="M4 5h16v14H4z"></path>
      <path d="m7 16 4-4 3 3 2-2 3 3"></path>
      <path d="M8.5 9.5h.1"></path>
    </symbol>
    <symbol id="icon-video" viewBox="0 0 24 24">
      <path d="M4 7h11v10H4z"></path>
      <path d="m15 10 5-3v10l-5-3z"></path>
    </symbol>
    <symbol id="icon-chart" viewBox="0 0 24 24">
      <path d="M5 19V5"></path>
      <path d="M5 19h15"></path>
      <path d="M8 16v-4"></path>
      <path d="M12 16V8"></path>
      <path d="M16 16v-7"></path>
    </symbol>
    <symbol id="icon-table" viewBox="0 0 24 24">
      <path d="M4 5h16v14H4z"></path>
      <path d="M4 10h16"></path>
      <path d="M9 5v14"></path>
      <path d="M15 5v14"></path>
    </symbol>
    <symbol id="icon-cards" viewBox="0 0 24 24">
      <path d="M4 7h6v10H4z"></path>
      <path d="M14 7h6v10h-6z"></path>
      <path d="M9 5h6v14H9z"></path>
    </symbol>
    <symbol id="icon-data" viewBox="0 0 24 24">
      <path d="M5 17h14"></path>
      <path d="M7 17V9"></path>
      <path d="M12 17V5"></path>
      <path d="M17 17v-6"></path>
    </symbol>
    <symbol id="icon-timeline" viewBox="0 0 24 24">
      <path d="M7 5v14"></path>
      <path d="M7 7h10"></path>
      <path d="M7 12h8"></path>
      <path d="M7 17h11"></path>
      <path d="M5.5 7h3"></path>
      <path d="M5.5 12h3"></path>
      <path d="M5.5 17h3"></path>
    </symbol>
    <symbol id="icon-quote" viewBox="0 0 24 24">
      <path d="M8 9h4v4c0 3-2 5-5 6"></path>
      <path d="M16 9h4v4c0 3-2 5-5 6"></path>
    </symbol>
    <symbol id="icon-code" viewBox="0 0 24 24">
      <path d="m9 8-4 4 4 4"></path>
      <path d="m15 8 4 4-4 4"></path>
    </symbol>
    <symbol id="icon-lang" viewBox="0 0 24 24">
      <path d="M4 5h9"></path>
      <path d="M8.5 5c-.5 4-2 7-4.5 9"></path>
      <path d="M6 9c1 2 3 4 6 5"></path>
      <path d="M14 19l3.5-8 3.5 8"></path>
      <path d="M15.5 16h4"></path>
    </symbol>
  </svg>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">P</span>
        <div>
          <strong>PPT.html Studio</strong>
          <small id="fileStatus">v0.2 · 草稿</small>
        </div>
      </div>

      <nav class="top-actions" aria-label="文件操作" data-i18n-aria="aria.fileActions">
        <button type="button" id="newDeckBtn" class="icon-button" data-i18n-title="action.new"><svg><use href="#icon-new"></use></svg><span class="sr-only" data-i18n="action.new">新建</span></button>
        <button type="button" id="templatesBtn" class="icon-button" data-i18n-title="action.templates"><svg><use href="#icon-template"></use></svg><span class="sr-only" data-i18n="action.templates">模板</span></button>
        <button type="button" id="openDeckBtn" class="icon-button" data-i18n-title="action.open"><svg><use href="#icon-open"></use></svg><span class="sr-only" data-i18n="action.open">打开</span></button>
        <button type="button" id="downloadDeckBtn" class="icon-button primary" data-i18n-title="action.save"><svg><use href="#icon-save"></use></svg><span class="sr-only" data-i18n="action.save">保存 / 下载</span></button>
        <button type="button" id="saveAsDeckBtn" class="icon-button" data-i18n-title="action.saveAs" hidden><svg><use href="#icon-save-as"></use></svg><span class="sr-only" data-i18n="action.saveAs">另存为</span></button>
        <button type="button" id="jsonBtn" class="icon-button" data-i18n-title="action.aiJson"><svg><use href="#icon-json"></use></svg><span class="sr-only" data-i18n="action.aiJson">AI JSON</span></button>
        <button type="button" id="validateBtn" class="icon-button" data-i18n-title="action.validate"><svg><use href="#icon-check"></use></svg><span class="sr-only" data-i18n="action.validate">检查</span></button>
        <button type="button" id="presentBtn" class="icon-button" data-i18n-title="action.present"><svg><use href="#icon-play"></use></svg><span class="sr-only" data-i18n="action.present">演示</span></button>
      </nav>
      <label class="language-switcher" data-i18n-title="language.label">
        <svg aria-hidden="true"><use href="#icon-lang"></use></svg>
        <select id="languageInput" aria-label="语言" data-i18n-aria="language.label">
          <option value="zh-CN">中文</option>
          <option value="en-US">English</option>
          <option value="ja-JP">日本語</option>
          <option value="ko-KR">한국어</option>
        </select>
      </label>
      <input id="fileInput" type="file" accept=".html,.json,application/json,text/html" hidden>
      <input id="imageFileInput" type="file" accept="image/*" hidden>
      <input id="videoFileInput" type="file" accept="video/*" hidden>
    </header>

    <main class="main-layout">
      <aside class="slide-rail" aria-label="幻灯片列表" data-i18n-aria="aria.slideList">
        <div class="rail-head">
          <span data-i18n="rail.pages">页面</span>
          <button type="button" id="addSlideBtn" class="icon-button" data-i18n-title="rail.addSlide"><svg><use href="#icon-plus"></use></svg><span class="sr-only" data-i18n="rail.addSlide">添加页面</span></button>
        </div>
        <div class="slide-list" id="slideList"></div>
        <div class="rail-tools">
          <button type="button" id="duplicateSlideBtn" class="icon-button" data-i18n-title="rail.duplicate"><svg><use href="#icon-copy"></use></svg><span class="sr-only" data-i18n="rail.duplicate">复制</span></button>
          <button type="button" id="moveSlideUpBtn" class="icon-button" data-i18n-title="rail.moveUp"><svg><use href="#icon-up"></use></svg><span class="sr-only" data-i18n="rail.moveUp">上移</span></button>
          <button type="button" id="moveSlideDownBtn" class="icon-button" data-i18n-title="rail.moveDown"><svg><use href="#icon-down"></use></svg><span class="sr-only" data-i18n="rail.moveDown">下移</span></button>
          <button type="button" id="deleteSlideBtn" class="icon-button danger" data-i18n-title="rail.delete"><svg><use href="#icon-trash"></use></svg><span class="sr-only" data-i18n="rail.delete">删除</span></button>
        </div>
      </aside>

      <aside class="insert-dock" aria-label="插入组件" data-i18n-aria="aria.insertComponents">
        <div class="dock-head">
          <span data-i18n="insert.title">插入</span>
        </div>
        <div class="insert-tools">
          <button type="button" class="insert-tool" draggable="true" data-insert="text" data-i18n-title="insert.text.title"><svg><use href="#icon-text"></use></svg><span data-i18n="insert.text">文本</span></button>
          <button type="button" class="insert-tool" draggable="true" data-insert="image" data-i18n-title="insert.image.title"><svg><use href="#icon-image"></use></svg><span data-i18n="insert.image">图片</span></button>
          <button type="button" class="insert-tool" draggable="true" data-insert="video" data-i18n-title="insert.video.title"><svg><use href="#icon-video"></use></svg><span data-i18n="insert.video">视频</span></button>
          <button type="button" class="insert-tool" draggable="true" data-insert="chart" data-i18n-title="insert.chart.title"><svg><use href="#icon-chart"></use></svg><span data-i18n="insert.chart">图表</span></button>
          <button type="button" class="insert-tool" draggable="true" data-insert="table" data-i18n-title="insert.table.title"><svg><use href="#icon-table"></use></svg><span data-i18n="insert.table">表格</span></button>
          <button type="button" class="insert-tool" draggable="true" data-insert="cards" data-i18n-title="insert.cards.title"><svg><use href="#icon-cards"></use></svg><span data-i18n="insert.cards">卡片</span></button>
          <button type="button" class="insert-tool" draggable="true" data-insert="metrics" data-i18n-title="insert.metrics.title"><svg><use href="#icon-data"></use></svg><span data-i18n="insert.metrics">数据</span></button>
          <button type="button" class="insert-tool" draggable="true" data-insert="timeline" data-i18n-title="insert.timeline.title"><svg><use href="#icon-timeline"></use></svg><span data-i18n="insert.timeline">时间线</span></button>
          <button type="button" class="insert-tool" draggable="true" data-insert="quote" data-i18n-title="insert.quote.title"><svg><use href="#icon-quote"></use></svg><span data-i18n="insert.quote">引用</span></button>
          <button type="button" class="insert-tool" draggable="true" data-insert="code" data-i18n-title="insert.code.title"><svg><use href="#icon-code"></use></svg><span data-i18n="insert.code">代码</span></button>
        </div>
      </aside>

      <section class="workspace" aria-label="编辑画布" data-i18n-aria="aria.workspace">
        <div class="workspace-head">
          <div class="deck-title-line">
            <span id="currentSlideLabel">第 1 页</span>
            <strong id="currentSlideTitle">标题</strong>
          </div>
          <div class="workspace-tools">
            <button type="button" id="undoBtn" class="icon-button" data-i18n-title="action.undo"><svg><use href="#icon-undo"></use></svg><span class="sr-only" data-i18n="action.undo">撤销</span></button>
            <button type="button" id="redoBtn" class="icon-button" data-i18n-title="action.redo"><svg><use href="#icon-redo"></use></svg><span class="sr-only" data-i18n="action.redo">重做</span></button>
          </div>
        </div>
        <div class="stage-viewport" id="stageViewport">
          <div class="stage-frame" id="stageFrame"></div>
        </div>
      </section>

      <aside class="inspector" aria-label="属性面板" data-i18n-aria="aria.inspector">
        <section class="panel-section">
          <h2 data-i18n="panel.deck">文稿</h2>
          <label>
            <span data-i18n="field.deckName">名称</span>
            <input id="deckTitleInput" type="text">
          </label>
          <label>
            <span data-i18n="field.theme">主题</span>
            <select id="deckThemeInput">
              <option value="paper">Paper</option>
              <option value="launch">Launch</option>
              <option value="studio">Studio</option>
              <option value="boardroom">Boardroom</option>
            </select>
          </label>
        </section>

        <section class="panel-section">
          <h2 data-i18n="panel.slide">页面</h2>
          <label>
            <span data-i18n="field.layout">版式</span>
            <select id="slideLayoutInput"></select>
          </label>
          <label>
            <span data-i18n="field.kicker">眉标</span>
            <input id="kickerInput" type="text">
          </label>
          <label>
            <span data-i18n="field.title">标题</span>
            <textarea id="titleInput" rows="2"></textarea>
          </label>
          <label>
            <span data-i18n="field.subtitle">副标题</span>
            <textarea id="subtitleInput" rows="2"></textarea>
          </label>
          <label class="field-group" data-layouts="text,imageRight,imageLeft,imageBackground,section,chart,video">
            <span data-i18n="field.body">正文</span>
            <textarea id="bodyInput" rows="5"></textarea>
          </label>
        </section>

        <section class="panel-section field-group" data-layouts="hero,imageRight,imageLeft,imageFull,imageBackground">
          <h2 data-i18n="panel.image">图片</h2>
          <div class="inline-tools">
            <button type="button" id="imageFileBtn" data-i18n="action.pickImage">选择本地图片</button>
          </div>
          <label>
            <span data-i18n="field.fit">适配</span>
            <select id="imageFitInput">
              <option value="cover" data-i18n="option.cover">填充裁切</option>
              <option value="contain" data-i18n="option.contain">完整显示</option>
            </select>
          </label>
          <label>
            <span data-i18n="field.imageSrc">图片 URL 或 Data URI</span>
            <input id="imageSrcInput" type="text">
          </label>
          <label>
            <span data-i18n="field.alt">替代文字</span>
            <input id="imageAltInput" type="text">
          </label>
          <label>
            <span data-i18n="field.caption">图片说明</span>
            <input id="imageCaptionInput" type="text">
          </label>
        </section>

        <section class="panel-section field-group" data-layouts="video">
          <h2 data-i18n="panel.video">视频</h2>
          <div class="inline-tools">
            <button type="button" id="videoFileBtn" data-i18n="action.pickVideo">选择本地视频</button>
          </div>
          <label>
            <span data-i18n="field.fit">适配</span>
            <select id="videoFitInput">
              <option value="cover" data-i18n="option.cover">填充裁切</option>
              <option value="contain" data-i18n="option.contain">完整显示</option>
            </select>
          </label>
          <label>
            <span data-i18n="field.videoSrc">视频 URL 或 Data URI</span>
            <input id="videoSrcInput" type="text">
          </label>
          <label>
            <span data-i18n="field.poster">封面 URL</span>
            <input id="videoPosterInput" type="text">
          </label>
          <label>
            <span data-i18n="field.caption">说明</span>
            <input id="videoCaptionInput" type="text">
          </label>
        </section>

        <section class="panel-section field-group" data-layouts="text,imageRight,imageLeft,timeline">
          <h2 data-i18n="panel.list">列表</h2>
          <label>
            <span data-i18n="field.listRows">每行一条；时间线可用 “标题 | 内容”</span>
            <textarea id="itemsInput" rows="6"></textarea>
          </label>
        </section>

        <section class="panel-section field-group" data-layouts="compare">
          <h2 data-i18n="panel.compare">对比</h2>
          <label>
            <span data-i18n="field.leftTitle">左侧标题</span>
            <input id="leftTitleInput" type="text">
          </label>
          <label>
            <span data-i18n="field.leftText">左侧内容</span>
            <textarea id="leftTextInput" rows="3"></textarea>
          </label>
          <label>
            <span data-i18n="field.rightTitle">右侧标题</span>
            <input id="rightTitleInput" type="text">
          </label>
          <label>
            <span data-i18n="field.rightText">右侧内容</span>
            <textarea id="rightTextInput" rows="3"></textarea>
          </label>
        </section>

        <section class="panel-section field-group" data-layouts="threeCards">
          <h2 data-i18n="panel.cards">卡片</h2>
          <label>
            <span data-i18n="field.cardsRows">每行一张卡片：标题 | 内容</span>
            <textarea id="cardsInput" rows="6"></textarea>
          </label>
        </section>

        <section class="panel-section field-group" data-layouts="data">
          <h2 data-i18n="panel.metrics">数据</h2>
          <label>
            <span data-i18n="field.metricsRows">每行一个指标：数值 | 标签 | 说明</span>
            <textarea id="metricsInput" rows="6"></textarea>
          </label>
        </section>

        <section class="panel-section field-group" data-layouts="chart">
          <h2 data-i18n="panel.chart">图表</h2>
          <label>
            <span data-i18n="field.chartKind">图表类型</span>
            <select id="chartKindInput">
              <option value="bar" data-i18n="option.bar">柱状图</option>
              <option value="line" data-i18n="option.line">折线图</option>
              <option value="donut" data-i18n="option.donut">环形图</option>
            </select>
          </label>
          <label>
            <span data-i18n="field.chartLabels">标签，用 | 分隔</span>
            <input id="chartLabelsInput" type="text" placeholder="Q1 | Q2 | Q3 | Q4" data-i18n-placeholder="placeholder.chartLabels">
          </label>
          <label>
            <span data-i18n="field.chartSeries">数据系列：每行一个系列，名称 | 数值 | 数值</span>
            <textarea id="chartSeriesInput" rows="6" placeholder="收入 | 12 | 20 | 31&#10;成本 | 8 | 11 | 18" data-i18n-placeholder="placeholder.chartSeries"></textarea>
          </label>
          <label>
            <span data-i18n="field.unit">单位</span>
            <input id="chartUnitInput" type="text" placeholder="万元" data-i18n-placeholder="placeholder.unit">
          </label>
        </section>

        <section class="panel-section field-group" data-layouts="table">
          <h2 data-i18n="panel.table">表格</h2>
          <label>
            <span data-i18n="field.tableColumns">表头，用 | 分隔</span>
            <input id="tableColumnsInput" type="text">
          </label>
          <label>
            <span data-i18n="field.tableRows">每行一组单元格，用 | 分隔</span>
            <textarea id="tableRowsInput" rows="6"></textarea>
          </label>
        </section>

        <section class="panel-section field-group" data-layouts="quote">
          <h2 data-i18n="panel.quote">引用</h2>
          <label>
            <span data-i18n="field.quote">引文</span>
            <textarea id="quoteInput" rows="4"></textarea>
          </label>
          <label>
            <span data-i18n="field.author">作者</span>
            <input id="authorInput" type="text">
          </label>
        </section>

        <section class="panel-section field-group" data-layouts="code">
          <h2 data-i18n="panel.code">代码</h2>
          <label>
            <span data-i18n="field.code">代码内容</span>
            <textarea id="codeInput" rows="8" spellcheck="false"></textarea>
          </label>
        </section>

        <section class="panel-section">
          <h2 data-i18n="panel.notes">备注</h2>
          <label>
            <span data-i18n="field.notes">演讲备注</span>
            <textarea id="notesInput" rows="4"></textarea>
          </label>
        </section>
      </aside>
    </main>
  </div>

  <div class="presenter" id="presenter" hidden>
    <div class="presenter-stage" id="presenterStage"></div>
    <div class="presenter-controls">
      <button type="button" id="presentPrevBtn" data-i18n="present.prev">上一页</button>
      <span id="presentCounter">1 / 1</span>
      <button type="button" id="presentNextBtn" data-i18n="present.next">下一页</button>
      <button type="button" id="presentExitBtn" data-i18n="present.exit">退出</button>
    </div>
  </div>

  <dialog class="json-dialog" id="jsonDialog">
    <form method="dialog">
      <header>
        <strong data-i18n="dialog.aiJson">AI JSON</strong>
        <button type="submit" data-i18n="dialog.close">关闭</button>
      </header>
      <textarea id="jsonTextarea" spellcheck="false"></textarea>
      <footer>
        <button type="button" id="copyJsonBtn" data-i18n="dialog.copyJson">复制当前 JSON</button>
        <button type="button" id="loadJsonBtn" class="primary" data-i18n="dialog.loadJson">从文本载入</button>
      </footer>
    </form>
  </dialog>

  <dialog class="template-dialog" id="templateDialog">
    <form method="dialog">
      <header>
        <strong data-i18n="dialog.templates">选择模板</strong>
        <button type="submit" data-i18n="dialog.close">关闭</button>
      </header>
      <div class="template-grid">
        <button type="button" class="template-card" data-template="ai-camera">
          <strong data-i18n="template.aiCamera.name">AI 导演相机</strong>
          <span data-i18n="template.aiCamera.desc">产品发布 demo，适合展示一个新想法。</span>
        </button>
        <button type="button" class="template-card" data-template="product-pitch">
          <strong data-i18n="template.productPitch.name">产品发布</strong>
          <span data-i18n="template.productPitch.desc">问题、方案、价值和下一步。</span>
        </button>
        <button type="button" class="template-card" data-template="lesson">
          <strong data-i18n="template.lesson.name">课程课件</strong>
          <span data-i18n="template.lesson.desc">学习目标、概念、练习和课后任务。</span>
        </button>
        <button type="button" class="template-card" data-template="project-update">
          <strong data-i18n="template.projectUpdate.name">项目汇报</strong>
          <span data-i18n="template.projectUpdate.desc">状态、风险、决策和里程碑。</span>
        </button>
      </div>
      <footer>
        <button type="submit" data-i18n="dialog.cancel">取消</button>
      </footer>
    </form>
  </dialog>

  <dialog class="validation-dialog" id="validationDialog">
    <form method="dialog">
      <header>
        <strong data-i18n="dialog.validation">质量检查</strong>
        <button type="submit" data-i18n="dialog.close">关闭</button>
      </header>
      <div class="validation-body">
        <p id="validationSummary"></p>
        <textarea id="validationReport" readonly spellcheck="false"></textarea>
      </div>
      <footer>
        <button type="button" id="copyValidationBtn" data-i18n="dialog.copyReport">复制报告</button>
      </footer>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./renderer.js"></script>
  <script src="./app.js"></script>
</body>
</html>
